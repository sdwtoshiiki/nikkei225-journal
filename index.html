<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日経225ミニ 取引ジャーナル</title>
<style>
  :root {
    --bg: #FAF9F6;
    --card: #FFFFFF;
    --border: #E4E1D8;
    --border-strong: #C9C5B8;
    --text: #23221E;
    --text-mute: #6B6A62;
    --text-faint: #9A9890;
    --accent: #1D9E75;
    --accent-bg: #E1F5EE;
    --accent-text: #085041;
    --danger: #D85A30;
    --danger-bg: #FAECE7;
    --danger-text: #712B13;
    --neutral: #888780;
    --neutral-bg: #F1EFE8;
    --neutral-text: #444441;
    --purple: #8A63D2;
    --purple-bg: #EEE8FA;
    --purple-text: #4A2F8A;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace;
    --sans: -apple-system, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17161A;
      --card: #201F24;
      --border: #34333A;
      --border-strong: #454450;
      --text: #EDEBE6;
      --text-mute: #A6A49C;
      --text-faint: #75746E;
      --accent: #4FCE9F;
      --accent-bg: #0F3A2E;
      --accent-text: #9FE1CB;
      --danger: #F0997B;
      --danger-bg: #472417;
      --danger-text: #F5C4B3;
      --neutral: #B4B2A9;
      --neutral-bg: #2C2C2A;
      --neutral-text: #D3D1C7;
      --purple: #B39DE8;
      --purple-bg: #362A52;
      --purple-text: #D9CBF5;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.6;
    padding: 20px 14px 60px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  header.top { margin-bottom: 22px; }
  .title-row { display: flex; align-items: center; gap: 8px; }
  header.top h1 { font-size: 19px; font-weight: 600; margin: 0 0 4px; letter-spacing: 0.2px; }
  header.top p { font-size: 13px; color: var(--text-mute); margin: 0; }
  .version-badge {
    font-family: ui-monospace, monospace; font-size: 11px; color: var(--text-mute);
    border: 1px solid var(--border-strong); border-radius: 20px; padding: 2px 9px;
    cursor: pointer; flex-shrink: 0; margin-bottom: 4px;
  }
  .version-badge:hover { color: var(--text); border-color: var(--text-mute); }
  .changelog { display: none; margin-top: 10px; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; max-height: 260px; overflow-y: auto; }
  .changelog.show { display: block; }
  .changelog-entry { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .changelog-entry:last-child { border-bottom: none; }
  .changelog-entry .cv { font-family: ui-monospace, monospace; font-weight: 600; color: var(--text); }
  .changelog-entry .cd { color: var(--text-faint); margin-left: 6px; }
  .changelog-entry ul { margin: 4px 0 0; padding-left: 18px; color: var(--text-mute); }

  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 22px; }
  .stat-box {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 8px; text-align: center;
  }
  .stat-box .num { font-family: var(--mono); font-size: 18px; font-weight: 600; }
  .stat-box .lab { font-size: 11px; color: var(--text-mute); margin-top: 2px; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-bottom: 16px;
  }
  .card h2 { font-size: 14px; font-weight: 600; margin: 0 0 14px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.5px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text-mute); margin-bottom: 4px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border-strong); border-radius: 8px;
    background: var(--bg); color: var(--text); font-size: 14px; font-family: var(--sans);
  }
  .field input[type=number], .field input[type=datetime-local] { font-family: var(--mono); }
  .field textarea { resize: vertical; min-height: 48px; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  @media (max-width: 480px) { .row3 { grid-template-columns: 1fr; } }

  .seg { display: flex; gap: 6px; }
  .seg button {
    flex: 1; padding: 8px 6px; border-radius: 8px; border: 1px solid var(--border-strong);
    background: var(--bg); color: var(--text-mute); font-size: 13px; cursor: pointer;
  }
  .seg button.active[data-v="buy"] { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }
  .seg button.active[data-v="sell"] { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger); }
  .seg button.active[data-v="wait"] { background: var(--neutral-bg); color: var(--neutral-text); border-color: var(--neutral); }
  .seg button.active[data-v="trend"] { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }
  .seg button.active[data-v="counter"] { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple); }
  .seg button.active[data-v="swing"] { background: var(--neutral-bg); color: var(--neutral-text); border-color: var(--neutral); }
  .seg button.active[data-v="day"] { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger); }

  .btn-primary {
    width: 100%; padding: 11px; border-radius: 8px; border: none;
    background: var(--text); color: var(--bg); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px;
  }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }
  .btn-secondary {
    padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border-strong);
    background: transparent; color: var(--text-mute); font-size: 12px; cursor: pointer;
  }

  .entry { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
  .entry:first-child { border-top: none; padding-top: 0; margin-top: 0; }

  .month-group { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
  .month-group-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; background: var(--bg); }
  .month-group-title { font-weight: 600; font-size: 14px; }
  .month-group-meta { flex: 1; text-align: right; font-size: 12px; color: var(--text-mute); }
  .month-group-meta .pos { color: var(--accent); font-weight: 600; }
  .month-group-meta .neg { color: var(--danger); font-weight: 600; }
  .month-group .chevron { color: var(--text-faint); transition: transform 0.2s ease; flex-shrink: 0; }
  .month-group.open .chevron { transform: rotate(90deg); }
  .month-group-body { display: none; padding: 4px 14px 14px; }
  .month-group.open .month-group-body { display: block; }
  .entry-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .entry-head .dt { font-size: 12px; color: var(--text-faint); font-family: var(--mono); }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .badge.buy { background: var(--accent-bg); color: var(--accent-text); }
  .badge.sell { background: var(--danger-bg); color: var(--danger-text); }
  .badge.wait { background: var(--neutral-bg); color: var(--neutral-text); }
  .badge.trend { background: var(--accent-bg); color: var(--accent-text); }
  .badge.counter { background: var(--purple-bg); color: var(--purple-text); }
  .badge.swing { background: transparent; border: 1px solid var(--border-strong); color: var(--text-mute); }
  .badge.day { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
  .badge.outline { background: transparent; border: 1px solid var(--border-strong); color: var(--text-mute); }
  .badge-row { display: flex; gap: 6px; align-items: center; }

  .pnl-tag { font-family: var(--mono); font-size: 16px; font-weight: 700; margin-top: 8px; }
  .pnl-tag.pos { color: var(--accent); }
  .pnl-tag.neg { color: var(--danger); }
  .pnl-tag.zero { color: var(--text-mute); }

  .month-row { display: flex; align-items: baseline; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .month-row:last-child { border-bottom: none; }
  .month-label { font-family: var(--mono); color: var(--text-mute); width: 72px; flex-shrink: 0; }
  .month-pnl { font-family: var(--mono); font-weight: 700; flex: 1; }
  .month-pnl.pos { color: var(--accent); }
  .month-pnl.neg { color: var(--danger); }
  .month-meta { font-size: 12px; color: var(--text-mute); flex-shrink: 0; }

  .breakdown { display: flex; gap: 16px; font-size: 12px; color: var(--text-mute); margin-bottom: 22px; padding: 0 2px; flex-wrap: wrap; }
  .breakdown b { color: var(--text); font-family: var(--mono); }
  .entry-body { font-size: 13px; margin-top: 8px; color: var(--text); }
  .entry-body .line { display: flex; gap: 6px; margin-bottom: 3px; }
  .entry-body .line .k { color: var(--text-mute); min-width: 84px; flex-shrink: 0; }
  .entry-body .line .v { font-family: var(--mono); }
  .entry-note { font-size: 13px; color: var(--text-mute); margin-top: 6px; white-space: pre-wrap; }
  .entry-actions { display: flex; gap: 8px; margin-top: 10px; }
  .entry-actions button {
    font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text-mute); cursor: pointer;
  }

  .checklist { display: flex; flex-direction: column; gap: 8px; }
  .chk { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--text); cursor: pointer; }
  .chk input { width: auto; margin: 2px 0 0; flex-shrink: 0; accent-color: var(--accent); }
  .chk-score { font-size: 12px; color: var(--text-mute); margin-top: 6px; }
  .chk-score .n { font-family: var(--mono); font-weight: 600; color: var(--text); }
  .trigger-summary { font-size: 12px; margin-top: 6px; }
  .trigger-summary .v { font-family: var(--mono); font-weight: 600; }
  .trigger-list { list-style: none; margin: 4px 0 0; padding: 0; font-size: 12px; color: var(--text-mute); }
  .trigger-list li { padding: 1px 0; }
  .trigger-list li.ok::before { content: "✓ "; color: var(--accent); }
  .trigger-list li.no::before { content: "✗ "; color: var(--text-faint); }

  .empty { text-align: center; color: var(--text-faint); font-size: 13px; padding: 24px 0; }
  .toolbar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 10px; }
  .status { font-size: 12px; color: var(--text-faint); text-align: center; padding: 6px; }

  .failsafe { display: none; margin-top: 10px; padding: 12px; border: 1px solid var(--danger); border-radius: 8px; background: var(--danger-bg); }
  .failsafe.show { display: block; }
  .failsafe p { font-size: 12px; color: var(--danger-text); margin: 0 0 8px; }
  .failsafe textarea { width: 100%; height: 90px; font-family: var(--mono); font-size: 11px; padding: 8px; border-radius: 6px; border: 1px solid var(--border-strong); background: var(--card); color: var(--text); }
  .failsafe button { margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="title-row">
      <h1>日経225ミニ 取引ジャーナル</h1>
      <span class="version-badge" id="versionBadge">v1.0</span>
    </div>
    <p>計画(Plan)を記録し、結果(Check)を積み重ねて次に活かすための記録ツール</p>
    <div class="changelog" id="changelogPanel"></div>
  </header>

  <div class="stat-row" id="statRow"></div>
  <div class="breakdown" id="breakdownRow"></div>

  <div class="card">
    <h2>月別損益</h2>
    <div id="monthlyList"><div class="status">記録がありません</div></div>
  </div>

  <div class="card">
    <h2>新しい記録</h2>
    <form id="entryForm">
      <div class="row2">
        <div class="field">
          <label>日時</label>
          <input type="datetime-local" id="f_datetime" required>
        </div>
        <div class="field">
          <label>現在値</label>
          <input type="number" step="1" id="f_price" placeholder="例: 69800" required>
        </div>
      </div>

      <div class="field">
        <label>シナリオ</label>
        <div class="seg" id="segDirection">
          <button type="button" data-v="buy">買い</button>
          <button type="button" data-v="sell">売り</button>
          <button type="button" data-v="wait">見送り</button>
        </div>
      </div>

      <div class="field">
        <label>トレードタイプ（任意）</label>
        <div class="seg" id="segTradeType">
          <button type="button" data-v="trend">順張り</button>
          <button type="button" data-v="counter">逆張り</button>
        </div>
      </div>

      <div class="field">
        <label>スタイル</label>
        <div class="seg" id="segStyle">
          <button type="button" data-v="swing">スイング</button>
          <button type="button" data-v="day">デイ</button>
        </div>
      </div>

      <div id="priceFields">
        <div class="row3">
          <div class="field">
            <label>エントリー価格</label>
            <input type="number" step="1" id="f_entry">
          </div>
          <div class="field">
            <label>損切り価格</label>
            <input type="number" step="1" id="f_stop">
          </div>
          <div class="field">
            <label>利確価格</label>
            <input type="number" step="1" id="f_target">
          </div>
        </div>
      </div>

      <div class="field">
        <label>エントリーのきっかけチェックリスト</label>
        <div class="checklist" id="checklist"></div>
        <div class="chk-score">きっかけの充足度：<span class="n" id="chkScore">0/0</span></div>
      </div>

      <div class="field">
        <label>判断の根拠</label>
        <textarea id="f_rationale" placeholder="例: 週足で上昇トレンド継続、日足終値で70,000円を上抜けて維持"></textarea>
      </div>

      <div class="field">
        <label>結果</label>
        <select id="f_outcome">
          <option value="pending">未確定</option>
          <option value="target_hit">利確ヒット</option>
          <option value="stop_hit">損切りヒット</option>
          <option value="wait_correct">見送りが正解だった</option>
          <option value="wait_missed">見送ったが逆に動いた</option>
        </select>
      </div>

      <div class="field">
        <label>実現損益（円・手数料込み、任意）</label>
        <input type="number" step="1" id="f_pnl" placeholder="例: 8422 または -10557">
      </div>

      <div class="field">
        <label>反省点・気づき</label>
        <textarea id="f_reflection" placeholder="例: ブレイク確認が甘く早すぎるエントリーだった"></textarea>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">記録を保存</button>

      <div class="failsafe" id="failSafe">
        <p>保存に失敗しました。念のため、この内容をコピーして手元に控えておいてください。時間を置いてから「記録を保存」をもう一度押すと、再保存を試みます。</p>
        <textarea id="failSafeText" readonly></textarea>
        <button type="button" class="btn-secondary" id="failSafeCopy">内容をコピー</button>
      </div>
    </form>
  </div>

  <div class="card">
    <h2>CSVから取り込む</h2>
    <div class="field">
      <label>このジャーナルから書き出したCSVファイルを選択</label>
      <input type="file" id="csvFile" accept=".csv,text/csv">
    </div>
    <div id="csvPreview" style="font-size:12px;color:var(--text-mute);margin-bottom:10px;"></div>
    <button type="button" class="btn-primary" id="csvImportBtn" disabled>インポート</button>
  </div>

  <div class="card">
    <div class="toolbar">
      <button class="btn-secondary" id="exportBtn">CSV書き出し</button>
      <button class="btn-secondary" id="resetBtn">全て削除</button>
    </div>
    <h2>履歴</h2>
    <div id="historyList"><div class="status">読み込み中…</div></div>
  </div>

</div>

<script>
const STORAGE_KEY = 'entries';
const SWING_TRIGGERS = [
  { key: 'trendAlign', label: '中長期トレンド認識（日足/週足）' },
  { key: 'mtfAlign', label: '複数時間軸の方向が一致' },
  { key: 'levelConfirm', label: '重要価格帯を日足終値で確認' },
  { key: 'invalidation', label: '無効化条件を事前に決めている' },
  { key: 'targetSet', label: '利益目標を事前に決めている' },
  { key: 'riskReward', label: 'リスクリワード1:2以上・EVプラス' },
  { key: 'eventAware', label: '保有期間中の主要イベントを把握' }
];
const DAY_TRIGGERS = [
  { key: 'tf5_15', label: '5分・15分足でエントリーサインを確認' },
  { key: 'atrAdjust', label: 'ATRに応じて損切り幅を調整（固定幅にしていない）' },
  { key: 'targetSet2x', label: '利益目標を損切り幅の最低2倍に設定' },
  { key: 'noCarry', label: 'その日のうちに手仕舞う予定（持ち越さない）' },
  { key: 'dailyLossOk', label: '1日の最大損失（3万円）にまだ達していない' },
  { key: 'avoidWindow', label: '寄り付き直後15分・指標発表前後30分を避けている' }
];

function currentTriggerDefs() {
  return style === 'day' ? DAY_TRIGGERS : SWING_TRIGGERS;
}

function triggerDefsFor(entryStyle) {
  return entryStyle === 'day' ? DAY_TRIGGERS : SWING_TRIGGERS;
}

let entries = [];
let editingId = null;
let direction = null;
let tradeType = null;
let style = null;
let lastSaveError = null;

function renderChecklist(preserveState) {
  const prior = preserveState || getChecklistState();
  const defs = currentTriggerDefs();
  document.getElementById('checklist').innerHTML = defs.map(t => `
    <label class="chk"><input type="checkbox" data-key="${t.key}" ${prior[t.key] ? 'checked' : ''}> ${t.label}</label>
  `).join('');
  updateChecklistScore();
}

function getChecklistState() {
  const state = {};
  document.querySelectorAll('#checklist input[type=checkbox]').forEach(cb => {
    state[cb.dataset.key] = cb.checked;
  });
  return state;
}

function setChecklistState(state) {
  renderChecklist(state || {});
}

function updateChecklistScore() {
  const state = getChecklistState();
  const count = Object.values(state).filter(Boolean).length;
  document.getElementById('chkScore').textContent = count + '/' + currentTriggerDefs().length;
}

document.getElementById('checklist').addEventListener('change', updateChecklistScore);

function setStyle(v) {
  style = v;
  document.querySelectorAll('#segStyle button').forEach(b => {
    b.classList.toggle('active', b.dataset.v === style);
  });
  renderChecklist();
}

document.getElementById('segStyle').addEventListener('click', (ev) => {
  const btn = ev.target.closest('button');
  if (!btn) return;
  setStyle(style === btn.dataset.v ? null : btn.dataset.v);
});

function setNowDefault() {
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('f_datetime').value = now.toISOString().slice(0,16);
}

const APP_VERSION = 'v1.12';
const CHANGELOG = [
  { v: 'v1.12', date: '2026-07-08', notes: ['バージョン表示・更新履歴パネルを追加'] },
  { v: 'v1.11', date: '2026-07-08', notes: ['CSV取り込み時に既存データとの重複を自動検出・除外'] },
  { v: 'v1.10', date: '2026-07-08', notes: ['履歴を月ごとに折りたたみ表示（直近月のみ自動展開）'] },
  { v: 'v1.9', date: '2026-07-08', notes: ['実現損益の入力欄を追加', '履歴に損益を色付きで表示', '月別損益の集計を追加'] },
  { v: 'v1.8', date: '2026-07-07', notes: ['証券会社の約定履歴CSVを自動認識し、新規/決済を自動でペアリングして取り込む機能を追加'] },
  { v: 'v1.7', date: '2026-07-07', notes: ['CSVからの記録取り込み（インポート）機能を追加'] },
  { v: 'v1.6', date: '2026-07-06', notes: ['「スイング/デイ」のスタイルタグを追加', 'デイトレード専用のチェックリスト（6項目）を追加'] },
  { v: 'v1.5', date: '2026-07-03', notes: ['「順張り/逆張り」のトレードタイプタグを追加', '順張り・逆張りの勝率breakdownを追加'] },

const JSONBIN_ID = '6a465c5eda38895dfe223dce';
const JSONBIN_KEY = '$2a$10$dU0iqZpuAzFeOFSJDG4IruKYigWk27bdtQL17DpJbW9an/yCr4rxi';
const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/' + JSONBIN_ID;

async function loadEntries() {
  try {
    const res = await fetch(JSONBIN_URL + '/latest', { headers: { 'X-Access-Key': JSONBIN_KEY } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    entries = (data.record && Array.isArray(data.record.entries)) ? data.record.entries : [];
  } catch (e) {
    console.error('読み込みエラー:', e);
    entries = [];
  }
  render();
}

async function saveEntries() {
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const res = await fetch(JSONBIN_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Access-Key': JSONBIN_KEY },
        body: JSON.stringify({ entries: entries })
      });
      if (res.ok) { lastSaveError = null; return true; }
      const bodyText = await res.text().catch(() => '');
      lastSaveError = 'HTTP ' + res.status + '  ' + bodyText.slice(0, 200);
      console.error('保存に失敗しました（HTTP ' + res.status + '）attempt', attempt + 1, bodyText);
    } catch (e) {
      lastSaveError = (e && e.message) ? e.message : String(e);
      console.error('Storage error (attempt ' + (attempt + 1) + '):', e);
    }
    if (attempt < 2) await new Promise(r => setTimeout(r, 700 * (attempt + 1)));
  }
  return false;
}

function fmtDt(iso) {
  const d = new Date(iso);
  return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') +
    ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function outcomeLabel(o) {
  return {
    pending: '未確定', target_hit: '利確ヒット', stop_hit: '損切りヒット',
    wait_correct: '見送り正解', wait_missed: '見送り外れ'
  }[o] || o;
}

function directionLabel(d) {
  return { buy: '買い', sell: '売り', wait: '見送り' }[d] || d;
}

function tradeTypeLabel(t) {
  return { trend: '順張り', counter: '逆張り' }[t] || null;
}

function styleLabel(s) {
  return { swing: 'スイング', day: 'デイ' }[s] || null;
}

function computeRR(e) {
  if (e.direction === 'wait' || !e.entry || !e.stop || !e.target) return null;
  let risk, reward;
  if (e.direction === 'buy') {
    risk = e.entry - e.stop;
    reward = e.target - e.entry;
  } else {
    risk = e.stop - e.entry;
    reward = e.entry - e.target;
  }
  if (!risk || risk <= 0) return null;
  return (reward / risk).toFixed(1);
}

function renderHistory() {

  const sorted = [...entries].sort((a, b) => new Date(b.datetime) - new Date(a.datetime));
  const groups = {};
  sorted.forEach(e => {
    const k = e.datetime ? e.datetime.slice(0, 7) : '不明';
    if (!groups[k]) groups[k] = [];
    groups[k].push(e);
  });
  const monthKeys = Object.keys(groups).sort().reverse();

  if (openMonths.size === 0 && monthKeys.length) {
    openMonths.add(monthKeys[0]);
  }

  list.innerHTML = monthKeys.map(k => {
    const groupEntries = groups[k];
    const pnlSum = groupEntries.filter(hasPnl).reduce((s, e) => s + Number(e.pnl), 0);
    const hasAnyPnl = groupEntries.some(hasPnl);
    const isOpen = openMonths.has(k);
    return `
      <div class="month-group ${isOpen ? 'open' : ''}" data-month="${k}">
        <div class="month-group-head">
          <span class="month-group-title">${monthGroupLabel(k)}</span>

  const settled = list.filter(e => e.outcome === 'target_hit' || e.outcome === 'stop_hit');
  const wins = settled.filter(e => e.outcome === 'target_hit').length;
  return settled.length ? Math.round((wins / settled.length) * 100) : null;
}

function renderMonthly() {
  const box = document.getElementById('monthlyList');
  const withPnl = entries.filter(hasPnl);
  if (!withPnl.length) {
    box.innerHTML = '<div class="status">損益が入力された記録がまだありません</div>';
    return;
  }
  const map = {};
  withPnl.forEach(e => {
    const k = e.datetime ? e.datetime.slice(0, 7) : '不明';
    if (!map[k]) map[k] = { total: 0, count: 0, win: 0 };
    const v = Number(e.pnl);
    map[k].total += v;
    map[k].count += 1;
    if (v > 0) map[k].win += 1;
  });
  const months = Object.keys(map).sort().reverse();
  box.innerHTML = months.map(k => {
    const m = map[k];
    const wr = m.count ? Math.round((m.win / m.count) * 100) : 0;
    const cls = m.total > 0 ? 'pos' : (m.total < 0 ? 'neg' : '');
    return `
      <div class="month-row">
        <span class="month-label">${k}</span>
        <span class="month-pnl ${cls}">${m.total >= 0 ? '+' : ''}${m.total.toLocaleString()}円</span>
        <span class="month-meta">${m.count}件・勝率${wr}%</span>
      </div>

  }).join('');
}

function looksLikeBrokerCSV(headers) {
  return headers.includes('約定日時') && headers.includes('取引') && headers.includes('約定単価');
}

function cleanNumber(s) {
  if (s == null) return '';
  return String(s).replace(/,/g, '').trim();
}

function parseBrokerDateTime(s) {
  const parts = String(s).trim().split(' ');
  const datePart = parts[0] || '';
  const timePart = parts[1] || '00:00:00';
  const [y, m, d] = datePart.split('/');
  if (!y || !m || !d) return '';
  const hm = timePart.slice(0, 5);
  return y + '-' + m.padStart(2, '0') + '-' + d.padStart(2, '0') + 'T' + hm;
}

function brokerRowsToEntries(dataObjs) {
  const opens = [];
  const pairs = [];
  dataObjs.forEach(r => {
    const action = r['取引'];
    if (action === '新規買' || action === '新規売') {
      opens.push(r);
    } else if (action === '決済買' || action === '決済売') {
      const o = opens.shift();
      if (o) pairs.push([o, r]);
    }
  });
  return pairs.map(([o, c], idx) => {
    const pnl = parseFloat(cleanNumber(c['決済損益'])) || 0;
    const entryPrice = cleanNumber(o['約定単価']);
    const exitPrice = cleanNumber(c['約定単価']);
    const pnlStr = (pnl >= 0 ? '+' : '') + pnl.toLocaleString();
    return {
      id: Date.now().toString(36) + '-b' + idx + '-' + Math.random().toString(36).slice(2, 6),
      datetime: parseBrokerDateTime(o['約定日時']),
      price: entryPrice,
      direction: o['取引'] === '新規買' ? 'buy' : 'sell',
      style: 'day',
      tradeType: null,
      entry: entryPrice,
      stop: null,
      target: null,
      outcome: pnl >= 0 ? 'target_hit' : 'stop_hit',
      pnl: pnl,
      rationale: '',
      reflection: '決済: ' + exitPrice + '円（' + c['約定日時'] + '）／実現損益 ' + pnlStr + '円（手数料込み）／証券会社の約定履歴から自動インポート',
      triggers: {}
    };
  });
}

function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i + 1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') { /* skip */ }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => c !== ''));
}

function csvRowToEntry(obj, salt) {
  const directionRev = { '買い': 'buy', '売り': 'sell', '見送り': 'wait' };
  const styleRev = { 'スイング': 'swing', 'デイ': 'day' };
  const tradeTypeRev = { '順張り': 'trend', '逆張り': 'counter' };
  const outcomeRev = { '未確定': 'pending', '利確ヒット': 'target_hit', '損切りヒット': 'stop_hit', '見送り正解': 'wait_correct', '見送り外れ': 'wait_missed' };

  const styleKey = styleRev[obj['スタイル']] || 'swing';
  const defs = triggerDefsFor(styleKey);
  const prefix = styleKey === 'day' ? '[デイ] ' : '[スイング] ';
  const triggers = {};
  defs.forEach(t => {
    if (obj[prefix + t.label] === '1') triggers[t.key] = true;
  });

  return {
    id: Date.now().toString(36) + '-' + salt + '-' + Math.random().toString(36).slice(2, 6),
    datetime: obj['日時'] || '',
    price: obj['現在値'] || '',
    direction: directionRev[obj['シナリオ']] || 'wait',
    style: styleKey,
    tradeType: tradeTypeRev[obj['トレードタイプ']] || null,
    entry: obj['エントリー'] || null,
    stop: obj['損切り'] || null,
    target: obj['利確'] || null,
    outcome: outcomeRev[obj['結果']] || 'pending',
    pnl: (obj['損益(円)'] !== undefined && obj['損益(円)'] !== '') ? Number(obj['損益(円)']) : null,
    rationale: obj['根拠'] || '',
    reflection: obj['反省'] || '',
    triggers: triggers
  };
}

function isDuplicateEntry(candidate, existingList) {
  return existingList.some(e =>
    e.datetime === candidate.datetime &&
    e.direction === candidate.direction &&
    String(e.entry ?? '') === String(candidate.entry ?? '')
  );
}

function dedupeAgainst(newEntries, existingEntries) {
  const kept = [];
  let skipped = 0;
  const combined = existingEntries.slice();
  newEntries.forEach(ne => {
    if (isDuplicateEntry(ne, combined)) {
      skipped++;
    } else {
      kept.push(ne);
      combined.push(ne);
    }
  });
  return { kept, skipped };
}

let pendingImportEntries = [];

document.getElementById('csvFile').addEventListener('change', (ev) => {
  const file = ev.target.files[0];
  const preview = document.getElementById('csvPreview');
  const importBtn = document.getElementById('csvImportBtn');
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const rows = parseCSV(reader.result);
      if (rows.length < 2) {
        preview.textContent = '有効なデータ行が見つかりませんでした。';
        importBtn.disabled = true;
        return;
      }
      const headers = rows[0];
      const dataObjs = rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, i) => { obj[h] = r[i] !== undefined ? r[i] : ''; });
        return obj;
      });

      let rawEntries;
      let formatNote;
      if (looksLikeBrokerCSV(headers)) {
        rawEntries = brokerRowsToEntries(dataObjs);
        formatNote = '証券会社の約定履歴を検出しました。新規と決済を自動的に組み合わせ、';
      } else {
        rawEntries = dataObjs.map((obj, idx) => csvRowToEntry(obj, idx));
        formatNote = '';
      }

      const { kept, skipped } = dedupeAgainst(rawEntries, entries);
      pendingImportEntries = kept;

      let msg = formatNote + kept.length + '件を新規登録の対象として検出しました。';
      if (skipped > 0) {
        msg += '（既存データと重複する' + skipped + '件は自動的に除外しました）';
      }
      msg += ' 内容を確認の上「インポート」を押してください。';
      preview.textContent = msg;
      importBtn.disabled = pendingImportEntries.length === 0;
    } catch (e) {
      preview.textContent = '読み込みエラー: ' + e.message;
      importBtn.disabled = true;
    }
  };
  reader.readAsText(file, 'UTF-8');
});

document.getElementById('csvImportBtn').addEventListener('click', async () => {
  const btn = document.getElementById('csvImportBtn');
  const preview = document.getElementById('csvPreview');
  btn.disabled = true;
  btn.textContent = '取り込み中…';

  const newEntries = pendingImportEntries;
  const previousEntries = entries;
  entries = [...entries, ...newEntries];
  const ok = await saveEntries();

  if (!ok) {
    entries = previousEntries;
    preview.textContent = 'インポートの保存に失敗しました。もう一度お試しください。';
    btn.disabled = false;
    btn.textContent = 'インポート';
    return;
  }

  preview.textContent = newEntries.length + '件を取り込みました。';
  pendingImportEntries = [];
  document.getElementById('csvFile').value = '';
  btn.disabled = true;
  btn.textContent = 'インポート';
  render();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  if (!entries.length) { alert('記録がありません。'); return; }
  const allTriggerCols = [
    ...SWING_TRIGGERS.map(t => ({ key: t.key, label: '[スイング] ' + t.label, style: 'swing' })),
    ...DAY_TRIGGERS.map(t => ({ key: t.key, label: '[デイ] ' + t.label, style: 'day' }))
  ];
  const headers = ['日時','現在値','シナリオ','スタイル','トレードタイプ','エントリー','損切り','利確','結果','損益(円)','根拠','反省','きっかけ充足度', ...allTriggerCols.map(t => t.label)];
  const rows = entries.map(e => {
    const triggers = e.triggers || {};
    const entryDefs = triggerDefsFor(e.style);
    const metCount = entryDefs.filter(t => triggers[t.key]).length;
    return [
      e.datetime, e.price, directionLabel(e.direction), styleLabel(e.style) || '', tradeTypeLabel(e.tradeType) || '', e.entry ?? '', e.stop ?? '', e.target ?? '',
      outcomeLabel(e.outcome), hasPnl(e) ? e.pnl : '', (e.rationale||'').replace(/\n/g,' '), (e.reflection||'').replace(/\n/g,' '),
      metCount + '/' + entryDefs.length,
      ...allTriggerCols.map(col => (col.style === (e.style || 'swing')) ? (triggers[col.key] ? '1' : '0') : '')
    ];
  });
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'nikkei225_journal.csv';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('failSafeCopy').addEventListener('click', async () => {
  const ta = document.getElementById('failSafeText');
  try {
    await navigator.clipboard.writeText(ta.value);
    const btn = document.getElementById('failSafeCopy');
    const original = btn.textContent;
    btn.textContent = 'コピーしました';
    setTimeout(() => { btn.textContent = original; }, 1500);
  } catch (e) {
    ta.focus();
    ta.select();
  }
});

setStyle('swing');
setNowDefault();
loadEntries();
</script>
